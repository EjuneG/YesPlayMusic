productName: YesPlayMusic
appId: com.yesplaymusic.app
copyright: Copyright © YesPlayMusic

directories:
  output: dist_electron
  app: .

asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/@unblockneteasemusic/**"

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: dist-electron/main.js

publish:
  - provider: github
    owner: EjuneG
    repo: YesPlayMusic
    releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico

nsis:
  oneClick: true
  perMachine: true
  deleteAppDataOnUninstall: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Music
  icon: build/icons

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.music
  icon: build/icons/icon.icns
