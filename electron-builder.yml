productName: YesPlayMusic
appId: com.yesplaymusic.app
copyright: Copyright © YesPlayMusic

directories:
  output: dist_electron
  app: .

asar: true

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: dist-electron/main.js

publish:
  - provider: github
    owner: EjuneG
    repo: YesPlayMusic
    releaseType: release

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Music
  icon: build/icons
